<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SCIOTS Externa</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
      }

      header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      header h1 {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #6366f1, #38bdf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      header p {
        margin-top: 0.4rem;
        color: #94a3b8;
        font-size: 0.95rem;
      }

      .card {
        background: #1e2130;
        border: 1px solid #2d3148;
        border-radius: 12px;
        padding: 1.5rem;
        width: 100%;
        max-width: 640px;
      }

      .card h2 {
        font-size: 1rem;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 1rem;
      }

      button {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, #6366f1, #38bdf8);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.65rem 1.4rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        margin-bottom: 1.5rem;
      }

      button:hover { opacity: 0.88; }
      button:active { transform: scale(0.97); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }

      .stat-box {
        background: #131625;
        border: 1px solid #2d3148;
        border-radius: 8px;
        padding: 0.9rem 1rem;
      }

      .stat-box .label {
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.3rem;
      }

      .stat-box .value {
        font-size: 1.35rem;
        font-weight: 700;
        color: #e2e8f0;
        word-break: break-all;
      }

      .raw-title {
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.4rem;
      }

      pre {
        background: #131625;
        border: 1px solid #2d3148;
        border-radius: 8px;
        padding: 1rem;
        font-size: 0.85rem;
        color: #7dd3fc;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 3rem;
      }

      .status {
        font-size: 0.82rem;
        color: #64748b;
        margin-top: 1rem;
        text-align: right;
      }

      .status.ok { color: #34d399; }
      .status.err { color: #f87171; }
    </style>
  </head>
  <body>
    <header>
      <h1>SCIOTS Externa</h1>
      <p>Panel de estadísticas de consumo anónimo</p>
    </header>

    <div class="card">
      <h2>Estadísticas del agregador</h2>

      <button id="btn">&#8635; Actualizar /stats</button>

      <div class="stats-grid" id="grid" style="display:none"></div>

      <p class="raw-title">Respuesta JSON</p>
      <pre id="out">Pulsa el botón para cargar los datos.</pre>

      <p class="status" id="status"></p>
    </div>

    <script>
      const btn    = document.getElementById('btn');
      const out    = document.getElementById('out');
      const grid   = document.getElementById('grid');
      const status = document.getElementById('status');

      const LABELS = { count: 'Registros', mean: 'Media', min: 'Mínimo', max: 'Máximo' };

      function renderGrid(data) {
        grid.style.display = 'grid';
        grid.innerHTML = Object.entries(LABELS).map(([k, label]) =>
          `<div class="stat-box">
            <div class="label">${label}</div>
            <div class="value">${data[k] ?? '—'}</div>
          </div>`
        ).join('');
      }

      btn.addEventListener('click', async () => {
        btn.disabled = true;
        out.textContent = 'Solicitando...';
        grid.style.display = 'none';
        status.textContent = '';
        status.className = 'status';

        try {
          const res  = await fetch('http://localhost:3001/stats');
          const data = await res.json();
          out.textContent = JSON.stringify(data, null, 2);
          renderGrid(data);
          status.textContent = `OK · ${new Date().toLocaleTimeString()}`;
          status.className = 'status ok';
        } catch (err) {
          out.textContent = 'Error: ' + err;
          status.textContent = 'Sin conexión con el agregador';
          status.className = 'status err';
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
